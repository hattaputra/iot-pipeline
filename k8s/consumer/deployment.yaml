apiVersion: apps/v1
kind: Deployment
metadata:
  name: iot-consumer
  namespace: ingestion
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iot-consumer
  template:
    metadata:
      labels:
        app: iot-consumer
    spec:
      containers:
        - name: iot-consumer
          image: iot-consumer:latest
          imagePullPolicy: Never
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka.data-plane.svc.cluster.local:9092"
            - name: CLICKHOUSE_HOST
              value: "clickhouse.data-plane.svc.cluster.local"
            - name: CLICKHOUSE_USER
              value: "admin"
            - name: CLICKHOUSE_PASSWORD
              value: "iot123"
            - name: CLICKHOUSE_DB
              value: "iot"
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 250m