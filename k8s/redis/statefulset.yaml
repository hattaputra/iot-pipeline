apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: data-plane
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine  # alpine: ~30MB, jauh lebih ringan dari full image
          command:
            - redis-server
            - /etc/redis/redis.conf
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi  # cukup untuk homelab single device
              cpu: 200m
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/redis
      volumes:
        - name: config
          configMap:
            name: redis-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 512Mi  # state machine data sangat kecil, 512Mi lebih dari cukup
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: data-plane
spec:
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
  clusterIP: None  # headless service, konsisten dengan pattern Kafka dan ClickHouse
