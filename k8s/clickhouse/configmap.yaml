apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-init
  namespace: data-plane
data:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS iot;

    CREATE TABLE IF NOT EXISTS iot.telemetry (
        device_id    String,
        temperature  Float32,
        humidity     Float32,
        received_at  DateTime64(3)
    ) ENGINE = MergeTree()
    PARTITION BY toYYYYMMDD(received_at)
    ORDER BY (device_id, received_at)
    TTL received_at + INTERVAL 90 DAY;